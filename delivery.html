<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner - SabziMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 0; }
        .header { background-color: #0c9e4b; color: white; padding: 20px 20px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 20px 20px;}
        .container { padding: 15px; max-width: 600px; margin: 0 auto;}
        
        .order-card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #0c9e4b; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .cust-name { font-size: 16px; font-weight: bold; color: #1e293b; }
        .order-details { font-size: 14px; line-height: 1.6; color: #475569; }
        .items-list { background: #f8fafc; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 13px; font-weight: 600; color: #334155; border: 1px solid #e2e8f0;}
        .total-bill { font-size: 18px; font-weight: bold; color: #0c9e4b; text-align: right; margin-bottom: 15px; }
        
        .btn-deliver { background: #1e293b; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;}
        .btn-deliver:active { transform: scale(0.98); }
        .status-done { text-align: center; color: #0c9e4b; font-weight: bold; padding: 12px; background: #e8f7ee; border-radius: 10px; }
        
        .no-orders { text-align: center; color: #94a3b8; margin-top: 50px; font-size: 16px; font-weight: 500;}
    </style>
</head>
<body>

    <div class="header"><i class="fas fa-motorcycle"></i> Delivery Partner Panel</div>

    <div class="container" id="deliveryOrdersContainer">
        <div class="no-orders"><i class="fas fa-spinner fa-spin"></i> Loading Deliveries...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyOtQ-LNPGiBZqAayWv-8pY2UDl_tHVicyM",
            authDomain: "sabzimart-3d585.firebaseapp.com",
            databaseURL: "https://sabzimart-3d585-default-rtdb.firebaseio.com",
            projectId: "sabzimart-3d585",
            storageBucket: "sabzimart-3d585.firebasestorage.app",
            messagingSenderId: "753632355469",
            appId: "1:753632355469:web:507f266899005ec65a2ec4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('LiveOrders').on('value', (snapshot) => {
            let container = document.getElementById('deliveryOrdersContainer');
            container.innerHTML = ''; 
            
            if(snapshot.exists()) {
                let orders = snapshot.val();
                for (let orderId in orders) {
                    let data = orders[orderId];
                    let itemsString = data.itemsOrdered ? data.itemsOrdered.join("<br>• ") : "No items";

                    let buttonHTML = '';
                    if(data.orderStatus !== "Delivered 🚚✅") {
                        buttonHTML = `<button class="btn-deliver" onclick="markDelivered('${orderId}')"><i class="fas fa-check-circle"></i> Mark as Delivered</button>`;
                    } else {
                        buttonHTML = `<div class="status-done"><i class="fas fa-check-double"></i> Already Delivered</div>`;
                    }

                    let cardHTML = `
                        <div class="order-card">
                            <div class="order-header"><div class="cust-name">👤 ${data.customerName}</div></div>
                            <div class="order-details">
                                <div><b>📞 Phone:</b> <a href="tel:${data.customerPhone}" style="color:#0c9e4b; text-decoration:none;">${data.customerPhone}</a></div>
                                <div style="margin-top:4px;"><b>🏠 Address:</b> ${data.customerAddress}</div>
                                <div class="items-list">• ${itemsString}</div>
                            </div>
                            <div class="total-bill">Collect Cash: ₹${data.totalBillAmount}</div>
                            ${buttonHTML}
                        </div>
                    `;
                    container.innerHTML = cardHTML + container.innerHTML; // Latest order top par
                }
            } else {
                container.innerHTML = '<div class="no-orders"><i class="fas fa-box-open" style="font-size:40px; margin-bottom:10px; display:block;"></i> No deliveries pending! Relax.</div>';
            }
        });

        function markDelivered(orderId) {
            if(confirm("Have you delivered this order and collected the cash?")) {
                database.ref('LiveOrders/' + orderId).update({
                    orderStatus: "Delivered 🚚✅"
                }).then(() => {
                    // Update successful
                });
            }
        }
    </script>
</body>
</html>
